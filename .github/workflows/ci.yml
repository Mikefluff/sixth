name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: make verify (78 demos / 1081 ✓)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Racket
        uses: Bogdanp/setup-racket@v1.11
        with:
          architecture: x64
          distribution: minimal
          variant: CS
          version: 8.13

      - name: Install Sixth package
        run: raco pkg install --link --auto --no-docs --batch .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps (renderer)
        run: pip install matplotlib networkx pillow

      - name: Run make verify
        run: make verify
