name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: make verify (102 demos / 1535 ✓)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Set up Racket
        uses: Bogdanp/setup-racket@v1.15
        with:
          architecture: x64
          distribution: minimal
          variant: CS
          version: 8.13

      - name: Install Sixth package
        # `.` is rejected as a package source by current raco
        # ("ending path element is not a name"); pass an explicit
        # --name and an absolute path so the install resolves
        # cleanly across racket / setup-racket versions.
        run: raco pkg install --link --auto --no-docs --batch --name sixth "$GITHUB_WORKSPACE"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python deps (renderer)
        run: pip install matplotlib networkx pillow

      - name: Run make verify
        run: make verify
